name: Fetch Data

on:
  schedule:
    # Weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/fetch-traffic.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update traffic fatality data"
          git push
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Data Pipeline] Fetch failed: NHTSA FARS';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'data-pipeline,failure'
            });
            if (!issues.find(i => i.title === title)) {
              await github.rest.issues.create({
                ...context.repo, title,
                body: `The NHTSA FARS traffic data fetch failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-pipeline', 'failure']
              });
            }

  fetch-air-quality:
