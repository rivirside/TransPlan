name: Fetch Data

on:
  schedule:
    # Weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# L-035 fix: Collapsed 5 parallel jobs into 1 sequential job.
# Previously each job independently committed + pushed, causing race conditions
# where the 2nd push would fail because main had moved forward.
# Now all scripts run sequentially in one job with a single commit at the end.

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      # --- Fetch scripts (each uses continue-on-error so one failure doesn't block others) ---

      - name: Fetch traffic fatality data (NHTSA FARS)
        run: node scripts/fetch-traffic.js
        continue-on-error: true

      - name: Load API keys
        env:
          EPA_BLS_KEYS: ${{ secrets.EPA_BLS_KEYS }}
        run: echo "$EPA_BLS_KEYS" >> "$GITHUB_ENV"

      - name: Fetch air quality data (EPA AQS)
        run: node scripts/fetch-air-quality.js
        continue-on-error: true

      - name: Fetch hospital quality data (CMS)
        run: node scripts/fetch-hospital-quality.js
        continue-on-error: true

      - name: Fetch cost of living data (BLS)
        run: node scripts/fetch-cost-of-living.js
        continue-on-error: true

      - name: Fetch health demographics data (CDC)
        run: node scripts/fetch-health-data.js
        continue-on-error: true

      - name: Fetch county-level health data (CDC PLACES — all US counties)
        run: node scripts/fetch-health-data-counties.js
        continue-on-error: true

      - name: Fetch per-monitor air quality data (EPA AQS — all states)
        run: node scripts/fetch-air-quality-monitors.js
        continue-on-error: true

      - name: Fetch cause-of-death data (CDC SODA)
        run: node scripts/fetch-cod-data.js
        continue-on-error: true

      # --- Single commit for all data changes ---

      - name: Commit all data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly data refresh"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Data Pipeline] Weekly fetch failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'data-pipeline,failure'
            });
            if (!issues.find(i => i.title === title)) {
              await github.rest.issues.create({
                ...context.repo, title,
                body: `The weekly data fetch pipeline failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-pipeline', 'failure']
              });
            }

  validate:
    needs: [fetch-all]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/validate-data.js
      - name: Create issue on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Data Pipeline] Data validation failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'data-pipeline,failure'
            });
            if (!issues.find(i => i.title === title)) {
              await github.rest.issues.create({
                ...context.repo, title,
                body: `Data validation failed after fetch.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-pipeline', 'failure']
              });
            }
