  validate:
    needs: [fetch-traffic, fetch-air-quality, fetch-hospital-quality, fetch-cost-of-living, fetch-health-data]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/validate-data.js
      - name: Create issue on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Data Pipeline] Data validation failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'data-pipeline,failure'
            });
            if (!issues.find(i => i.title === title)) {
              await github.rest.issues.create({
                ...context.repo, title,
                body: `Data validation failed after fetch.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-pipeline', 'failure']
              });
            }
