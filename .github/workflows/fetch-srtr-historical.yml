name: Fetch SRTR Historical Data

on:
  schedule:
    # Run on the 5th of Feb, Mar, Aug, Sep at 12pm UTC
    # SRTR releases in Jan and Jul — check shortly after for new data
    - cron: '0 12 5 2,3,8,9 *'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Re-download all releases (not just new ones)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  fetch-historical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install xlrd
        run: pip install xlrd

      - name: Fetch and parse historical SRTR data
        env:
          FORCE_ALL: ${{ inputs.force_all }}
        run: |
          FLAGS="--parse"
          if [ "$FORCE_ALL" = "true" ]; then
            FLAGS="$FLAGS --all"
          fi
          python3 scripts/fetch-srtr-historical.py $FLAGS

      - name: Commit updated historical data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/srtr-historical.json data/wait-time-distributions.json data/competing-risks.json data/post-transplant-outcomes.json
          git diff --staged --quiet || git commit -m "chore: update SRTR historical trend data"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Data Pipeline] SRTR historical fetch failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'data-pipeline,failure'
            });
            if (!issues.find(i => i.title === title)) {
              await github.rest.issues.create({
                ...context.repo, title,
                body: `The SRTR historical data pipeline failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['data-pipeline', 'failure']
              });
            }
