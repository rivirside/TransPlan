<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transplant.today - Spatial Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          onerror="window._cdnFailed=window._cdnFailed||{};window._cdnFailed.leafletCss=true;" />
    <script src="dark-mode.js"></script>
    <style>
        /* Full-viewport map layout */
        .spatial-wrap {
            position: relative;
            width: 100%;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        #spatial-map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Sidebar */
        .spatial-sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background: var(--surface, #fff);
            border-right: 1px solid var(--border, #e5e7eb);
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.25s ease;
            box-shadow: var(--shadow-lg);
        }
        .spatial-sidebar.collapsed {
            transform: translateX(-320px);
        }

        .sidebar-toggle {
            position: absolute;
            top: 12px;
            left: 320px;
            z-index: 1001;
            width: 32px;
            height: 32px;
            background: var(--surface, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-left: none;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-2, #4a4f65);
            box-shadow: var(--shadow-sm);
            transition: left 0.25s ease, background 0.15s;
        }
        .sidebar-toggle:hover {
            background: var(--surface-raised, #f1f3f7);
        }
        .spatial-sidebar.collapsed + .sidebar-toggle {
            left: 0;
            border-left: 1px solid var(--border, #e5e7eb);
            border-radius: 0 6px 6px 0;
        }

        /* Sidebar content */
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border, #e5e7eb);
        }
        .sidebar-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-1, #111);
            margin: 0 0 4px;
        }
        .sidebar-header p {
            font-size: 0.78rem;
            color: var(--text-muted, #6b7280);
            margin: 0;
        }

        .sidebar-section {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light, #f0f0f0);
        }
        .sidebar-section label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-1, #111);
            margin-bottom: 6px;
        }
        .sidebar-section select,
        .sidebar-section input[type="range"] {
            width: 100%;
        }
        .sidebar-section select {
            padding: 6px 8px;
            border: 1px solid var(--border, #d1d5db);
            border-radius: 6px;
            font-size: 0.85rem;
            background: var(--surface, #fff);
            color: var(--text-1, #111);
        }
        .sidebar-section select:focus {
            outline: 2px solid var(--color-primary, #c97c4a);
            border-color: transparent;
        }

        /* Toggle buttons (RBF | IDW) */
        .method-toggles {
            display: flex;
            gap: 0;
            border: 1px solid var(--border, #d1d5db);
            border-radius: 6px;
            overflow: hidden;
        }
        .method-btn {
            flex: 1;
            padding: 6px 0;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: var(--surface, #fff);
            color: var(--text-2, #4a4f65);
            transition: all 0.15s;
        }
        .method-btn + .method-btn {
            border-left: 1px solid var(--border, #d1d5db);
        }
        .method-btn.active {
            background: var(--color-primary, #c97c4a);
            color: #fff;
        }
        .method-btn:hover:not(.active) {
            background: var(--surface-raised, #f1f3f7);
        }

        /* Resolution slider */
        .range-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .range-row input[type="range"] {
            flex: 1;
            accent-color: var(--color-primary, #c97c4a);
        }
        .range-val {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-1, #111);
            min-width: 28px;
            text-align: right;
        }

        /* Load button */
        .load-btn {
            width: 100%;
            padding: 8px 0;
            background: var(--color-primary, #c97c4a);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .load-btn:hover {
            background: var(--color-primary-dark, #a0603a);
        }
        .load-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Tier badge */
        .tier-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .tier-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tier-web {
            background: var(--color-primary-100, #f9e8d9);
            color: var(--color-primary-700, #7d4b2d);
        }
        .tier-local {
            background: var(--success-100, #D1FAE5);
            color: var(--success-700, #115C38);
        }
        .tier-caps {
            font-size: 0.72rem;
            color: var(--text-muted, #6b7280);
        }

        /* Allocation section */
        .alloc-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-1, #111);
            cursor: pointer;
        }
        .alloc-checkbox input[type="checkbox"] {
            accent-color: var(--color-primary, #c97c4a);
        }

        /* Score card */
        .score-card {
            display: none;
            background: var(--surface-raised, #f1f3f7);
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 8px;
        }
        .score-card.visible {
            display: block;
        }
        .score-card h4 {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-1, #111);
            margin-bottom: 6px;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .score-item {
            text-align: center;
        }
        .score-item .score-val {
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-primary, #c97c4a);
        }
        .score-item .score-label {
            font-size: 0.7rem;
            color: var(--text-muted, #6b7280);
        }

        /* Inspect panel (bottom overlay on map) */
        .inspect-panel {
            display: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--surface, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 240px;
            box-shadow: var(--shadow-lg);
        }
        .inspect-panel.visible {
            display: block;
        }
        .inspect-panel h4 {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-1, #111);
            margin-bottom: 4px;
        }
        .inspect-coords {
            font-size: 0.75rem;
            color: var(--text-muted, #6b7280);
            margin-bottom: 6px;
        }
        .inspect-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary, #c97c4a);
            margin-bottom: 4px;
        }
        .inspect-stats {
            font-size: 0.75rem;
            color: var(--text-2, #4a4f65);
            line-height: 1.5;
        }
        .inspect-close {
            position: absolute;
            top: 6px;
            right: 8px;
            background: none;
            border: none;
            font-size: 1rem;
            color: var(--text-muted, #6b7280);
            cursor: pointer;
            line-height: 1;
        }

        /* Loading overlay */
        .map-loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1002;
            background: var(--surface, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: 8px;
            padding: 16px 24px;
            box-shadow: var(--shadow-lg);
            font-size: 0.9rem;
            color: var(--text-1, #111);
            text-align: center;
        }
        .map-loading.visible {
            display: block;
        }
        .map-loading .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border, #e5e7eb);
            border-top-color: var(--color-primary, #c97c4a);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Layer group optgroup styling */
        .sidebar-section select optgroup {
            font-weight: 600;
            color: var(--text-1, #111);
        }

        /* Status message */
        .sidebar-status {
            font-size: 0.75rem;
            color: var(--text-muted, #6b7280);
            padding: 0 16px 8px;
            min-height: 20px;
        }
        .sidebar-status.error {
            color: var(--danger, #D93B3B);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .spatial-sidebar {
                width: 280px;
            }
            .spatial-sidebar.collapsed + .sidebar-toggle {
                left: 0;
            }
            .sidebar-toggle {
                left: 280px;
            }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="spatial-wrap">
        <!-- Sidebar -->
        <div class="spatial-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Spatial Analysis</h2>
                <p>Explore interpolated transplant data layers across the US</p>
            </div>

            <!-- Layer selector -->
            <div class="sidebar-section">
                <label for="layerSelect">Data Layer</label>
                <select id="layerSelect">
                    <option value="">Loading layers...</option>
                </select>
            </div>

            <!-- Organ filter -->
            <div class="sidebar-section">
                <label for="organFilter">Organ Filter</label>
                <select id="organFilter">
                    <option value="kidney">Kidney</option>
                    <option value="liver">Liver</option>
                    <option value="heart">Heart</option>
                    <option value="lung">Lung</option>
                    <option value="pancreas">Pancreas</option>
                    <option value="intestine">Intestine</option>
                </select>
            </div>

            <!-- Interpolation method -->
            <div class="sidebar-section">
                <label>Interpolation Method</label>
                <div class="method-toggles">
                    <button type="button" class="method-btn active" data-method="rbf">RBF</button>
                    <button type="button" class="method-btn" data-method="idw">IDW</button>
                </div>
            </div>

            <!-- Resolution slider -->
            <div class="sidebar-section">
                <label for="resolutionSlider">Resolution <span class="range-val" id="resolutionValue">30</span></label>
                <div class="range-row">
                    <input type="range" id="resolutionSlider" min="10" max="100" value="30" step="5">
                </div>
            </div>

            <!-- Load button -->
            <div class="sidebar-section">
                <button type="button" class="load-btn" id="loadBtn" disabled>Load Heatmap</button>
                <div class="tier-row">
                    <span class="tier-badge tier-web" id="tierBadge">Web</span>
                    <span class="tier-caps" id="tierCaps"></span>
                </div>
            </div>

            <!-- Allocation circles -->
            <div class="sidebar-section">
                <label class="alloc-checkbox">
                    <input type="checkbox" id="allocCheck">
                    Show allocation circles
                </label>
                <p style="font-size:0.72rem; color:var(--text-muted); margin-top:4px;">Click a center marker to draw 250nm / 500nm UNOS circles</p>
            </div>

            <!-- Distance score card -->
            <div class="sidebar-section">
                <div class="score-card" id="scoreCard">
                    <h4>Distance Score</h4>
                    <div class="score-grid">
                        <div class="score-item">
                            <div class="score-val" id="scoreComposite">--</div>
                            <div class="score-label">Composite</div>
                        </div>
                        <div class="score-item">
                            <div class="score-val" id="scoreProximity">--</div>
                            <div class="score-label">Proximity</div>
                        </div>
                        <div class="score-item">
                            <div class="score-val" id="scoreCompetition">--</div>
                            <div class="score-label">Competition</div>
                        </div>
                        <div class="score-item">
                            <div class="score-val" id="scoreDonorPool">--</div>
                            <div class="score-label">Donor Pool</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-status" id="sidebarStatus"></div>
        </div>

        <!-- Sidebar toggle button -->
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9664;</button>

        <!-- Map -->
        <div id="spatial-map"></div>

        <!-- Inspect panel -->
        <div class="inspect-panel" id="inspectPanel">
            <button type="button" class="inspect-close" id="inspectClose" aria-label="Close">&times;</button>
            <h4 id="inspectLayer">--</h4>
            <div class="inspect-coords" id="inspectCoords">--</div>
            <div class="inspect-value" id="inspectValue">--</div>
            <div class="inspect-stats" id="inspectStats">--</div>
        </div>

        <!-- Loading overlay -->
        <div class="map-loading" id="mapLoading">
            <span class="spinner"></span>Loading heatmap...
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            onerror="window._cdnFailed=window._cdnFailed||{};window._cdnFailed.leaflet=true;"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"
            onerror="window._cdnFailed=window._cdnFailed||{};window._cdnFailed.leafletHeat=true;"></script>
    <script src="components/site-chrome.js?v=8"></script>
    <script src="donation-banner.js"></script>
    <script src="session.js"></script>
    <script src="dark-mode.js"></script>
    <script src="api-client.js"></script>
    <script>
    (function () {
        'use strict';

        // ── API base ──
        var apiBase = (window.TransPlanAPI && window.TransPlanAPI.getBaseUrl)
            ? window.TransPlanAPI.getBaseUrl()
            : '';

        // ── State ──
        var map = null;
        var heatLayer = null;
        var allocCircles = [];
        var centerMarkers = [];
        var selectedLayer = '';
        var selectedMethod = 'rbf';
        var resolution = 30;
        var maxResolution = 100;
        var tierConfig = null;

        // ── DOM refs ──
        var sidebar = document.getElementById('sidebar');
        var sidebarToggle = document.getElementById('sidebarToggle');
        var layerSelect = document.getElementById('layerSelect');
        var organFilter = document.getElementById('organFilter');
        var resSlider = document.getElementById('resolutionSlider');
        var resValue = document.getElementById('resolutionValue');
        var loadBtn = document.getElementById('loadBtn');
        var allocCheck = document.getElementById('allocCheck');
        var scoreCard = document.getElementById('scoreCard');
        var inspectPanel = document.getElementById('inspectPanel');
        var inspectClose = document.getElementById('inspectClose');
        var mapLoading = document.getElementById('mapLoading');
        var sidebarStatus = document.getElementById('sidebarStatus');
        var tierBadge = document.getElementById('tierBadge');
        var tierCaps = document.getElementById('tierCaps');

        // ── Initialize map ──
        function initMap() {
            if (typeof L === 'undefined') {
                setStatus('Leaflet library failed to load. Check your connection.', true);
                return;
            }

            map = L.map('spatial-map', {
                zoomControl: true
            }).setView([39.8, -98.5], 4);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'OpenStreetMap',
                maxZoom: 18
            }).addTo(map);

            // Click-to-inspect
            map.on('click', onMapClick);
        }

        // ── Sidebar toggle ──
        sidebarToggle.addEventListener('click', function () {
            var isCollapsed = sidebar.classList.toggle('collapsed');
            sidebarToggle.textContent = isCollapsed ? '\u25B6' : '\u25C0';
            // Invalidate map size after sidebar animation
            setTimeout(function () {
                if (map) map.invalidateSize();
            }, 300);
        });

        // ── Load layers ──
        function loadLayers() {
            fetch(apiBase + '/spatial-layers')
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    var layers = data.layers || [];
                    populateLayerSelect(layers);
                    loadBtn.disabled = false;
                    setStatus('');
                })
                .catch(function (err) {
                    setStatus('Could not load layers. Is the backend running?', true);
                    // Populate with known defaults so page is still usable
                    populateLayerSelect(getDefaultLayers());
                    loadBtn.disabled = false;
                });
        }

        function getDefaultLayers() {
            return [
                'air_quality', 'cost_of_living',
                'health_diabetesRate', 'health_obesityRate', 'health_smokingRate',
                'health_ckdRate', 'health_hypertensionRate',
                'wait_time_factor_kidney', 'mortality_factor_kidney', 'graft_survival_kidney',
                'wait_time_factor_liver', 'mortality_factor_liver', 'graft_survival_liver',
                'wait_time_factor_heart', 'mortality_factor_heart', 'graft_survival_heart',
                'wait_time_factor_lung', 'mortality_factor_lung', 'graft_survival_lung'
            ];
        }

        function populateLayerSelect(layers) {
            while (layerSelect.firstChild) layerSelect.removeChild(layerSelect.firstChild);

            // Group layers
            var groups = {
                'General': [],
                'Health': [],
                'Kidney': [],
                'Liver': [],
                'Heart': [],
                'Lung': [],
                'Pancreas': [],
                'Intestine': [],
                'Other': []
            };

            layers.forEach(function (name) {
                if (name === 'air_quality' || name === 'cost_of_living') {
                    groups['General'].push(name);
                } else if (name.indexOf('health_') === 0) {
                    groups['Health'].push(name);
                } else if (name.indexOf('kidney') !== -1) {
                    groups['Kidney'].push(name);
                } else if (name.indexOf('liver') !== -1) {
                    groups['Liver'].push(name);
                } else if (name.indexOf('heart') !== -1) {
                    groups['Heart'].push(name);
                } else if (name.indexOf('lung') !== -1) {
                    groups['Lung'].push(name);
                } else if (name.indexOf('pancreas') !== -1) {
                    groups['Pancreas'].push(name);
                } else if (name.indexOf('intestine') !== -1) {
                    groups['Intestine'].push(name);
                } else {
                    groups['Other'].push(name);
                }
            });

            var first = true;
            Object.keys(groups).forEach(function (groupName) {
                var items = groups[groupName];
                if (items.length === 0) return;

                var optgroup = document.createElement('optgroup');
                optgroup.label = groupName;

                items.forEach(function (layerName) {
                    var opt = document.createElement('option');
                    opt.value = layerName;
                    opt.textContent = formatLayerName(layerName);
                    if (first) {
                        opt.selected = true;
                        selectedLayer = layerName;
                        first = false;
                    }
                    optgroup.appendChild(opt);
                });

                layerSelect.appendChild(optgroup);
            });
        }

        function formatLayerName(name) {
            // Convert snake_case to readable
            return name
                .replace(/_/g, ' ')
                .replace(/\b\w/g, function (c) { return c.toUpperCase(); })
                .replace(/Ckd/g, 'CKD');
        }

        // ── Organ filter ──
        organFilter.addEventListener('change', function () {
            // When organ changes, update the layer dropdown to show matching organ layers
            var organ = organFilter.value;
            var opts = layerSelect.querySelectorAll('option');
            // Auto-select the wait_time_factor layer for the new organ if current is organ-specific
            if (selectedLayer && (selectedLayer.indexOf('_kidney') !== -1 ||
                selectedLayer.indexOf('_liver') !== -1 ||
                selectedLayer.indexOf('_heart') !== -1 ||
                selectedLayer.indexOf('_lung') !== -1 ||
                selectedLayer.indexOf('_pancreas') !== -1 ||
                selectedLayer.indexOf('_intestine') !== -1)) {
                var base = selectedLayer.replace(/_kidney|_liver|_heart|_lung|_pancreas|_intestine/g, '');
                var target = base + '_' + organ;
                for (var i = 0; i < opts.length; i++) {
                    if (opts[i].value === target) {
                        layerSelect.value = target;
                        selectedLayer = target;
                        break;
                    }
                }
            }
        });

        // ── Layer select ──
        layerSelect.addEventListener('change', function () {
            selectedLayer = layerSelect.value;
        });

        // ── Method toggles ──
        var methodBtns = document.querySelectorAll('.method-btn');
        methodBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                methodBtns.forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                selectedMethod = btn.getAttribute('data-method');
            });
        });

        // ── Resolution slider ──
        resSlider.addEventListener('input', function () {
            resolution = parseInt(resSlider.value, 10);
            resValue.textContent = resolution;
        });

        // ── Load heatmap ──
        loadBtn.addEventListener('click', loadHeatmap);

        function loadHeatmap() {
            if (!selectedLayer) {
                setStatus('Please select a layer.', true);
                return;
            }

            loadBtn.disabled = true;
            mapLoading.classList.add('visible');
            setStatus('');

            var url = apiBase + '/spatial-grid?layer=' + encodeURIComponent(selectedLayer) +
                '&resolution=' + resolution +
                '&method=' + encodeURIComponent(selectedMethod);

            fetch(url)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    // Remove old heat layer
                    if (heatLayer) {
                        map.removeLayer(heatLayer);
                        heatLayer = null;
                    }

                    var points = data.points || [];
                    if (points.length === 0) {
                        setStatus('No data points returned for this layer.', true);
                        return;
                    }

                    heatLayer = L.heatLayer(points, {
                        radius: 25,
                        blur: 15,
                        maxZoom: 10,
                        max: 1.0,
                        gradient: {
                            0.0: '#f7e8d0',
                            0.25: '#f0cdb0',
                            0.5: '#d6925e',
                            0.75: '#c97c4a',
                            1.0: '#7d4b2d'
                        }
                    }).addTo(map);

                    var range = data.value_range || {};
                    setStatus(formatLayerName(selectedLayer) + ' loaded. Range: ' +
                        (range.min !== undefined ? range.min.toFixed(1) : '?') + ' - ' +
                        (range.max !== undefined ? range.max.toFixed(1) : '?'));
                })
                .catch(function (err) {
                    setStatus('Failed to load heatmap: ' + err.message, true);
                })
                .finally(function () {
                    loadBtn.disabled = false;
                    mapLoading.classList.remove('visible');
                });
        }

        // ── Click-to-inspect ──
        function onMapClick(e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            // Bounds check for CONUS
            if (lat < 24 || lat > 50 || lon < -125 || lon > -66) return;

            if (!selectedLayer) return;

            var url = apiBase + '/interpolated-value?lat=' + lat.toFixed(4) +
                '&lon=' + lon.toFixed(4) +
                '&layer=' + encodeURIComponent(selectedLayer) +
                '&method=' + encodeURIComponent(selectedMethod);

            fetch(url)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    showInspectPanel(data, lat, lon);

                    // Show popup on map using safe DOM construction
                    var stats = data.stats || {};
                    var popupEl = document.createElement('div');

                    var title = document.createElement('strong');
                    title.textContent = formatLayerName(data.layer || selectedLayer);
                    popupEl.appendChild(title);

                    popupEl.appendChild(document.createElement('br'));

                    var valText = document.createTextNode(
                        'Value: ' + (data.value !== undefined ? data.value.toFixed(3) : 'N/A')
                    );
                    popupEl.appendChild(valText);

                    popupEl.appendChild(document.createElement('br'));

                    var rangeText = document.createTextNode(
                        'Range: ' + (stats.min !== undefined ? stats.min.toFixed(1) : '?') +
                        ' - ' + (stats.max !== undefined ? stats.max.toFixed(1) : '?')
                    );
                    popupEl.appendChild(rangeText);

                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(popupEl)
                        .openOn(map);

                    // If allocation circles checked, draw them
                    if (allocCheck.checked) {
                        loadAllocationCircles(lat, lon);
                    }

                    // Load distance score
                    loadDistanceScore(lat, lon);
                })
                .catch(function () {
                    // Silently fail — user clicked outside data range
                });
        }

        function showInspectPanel(data, lat, lon) {
            var stats = data.stats || {};
            document.getElementById('inspectLayer').textContent = formatLayerName(data.layer || selectedLayer);
            document.getElementById('inspectCoords').textContent = lat.toFixed(4) + ', ' + lon.toFixed(4);
            document.getElementById('inspectValue').textContent = data.value !== undefined ? data.value.toFixed(3) : 'N/A';

            var statsEl = document.getElementById('inspectStats');
            while (statsEl.firstChild) statsEl.removeChild(statsEl.firstChild);
            statsEl.appendChild(document.createTextNode(
                'Min: ' + (stats.min !== undefined ? stats.min.toFixed(2) : '?') +
                ' \u00B7 Max: ' + (stats.max !== undefined ? stats.max.toFixed(2) : '?') +
                ' \u00B7 Mean: ' + (stats.mean !== undefined ? stats.mean.toFixed(2) : '?') +
                ' \u00B7 Std: ' + (stats.std !== undefined ? stats.std.toFixed(2) : '?')
            ));

            inspectPanel.classList.add('visible');
        }

        inspectClose.addEventListener('click', function () {
            inspectPanel.classList.remove('visible');
        });

        // ── Allocation circles ──
        function clearAllocCircles() {
            allocCircles.forEach(function (c) {
                map.removeLayer(c);
            });
            allocCircles = [];
        }

        function loadAllocationCircles(lat, lon) {
            clearAllocCircles();

            var organ = organFilter.value;
            var url = apiBase + '/allocation-circles?lat=' + lat.toFixed(4) +
                '&lon=' + lon.toFixed(4) +
                '&organ=' + encodeURIComponent(organ);

            fetch(url)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    // 250nm circle (~463km)
                    var circle250 = L.circle([lat, lon], {
                        radius: 463000,
                        color: '#c97c4a',
                        fill: false,
                        weight: 2,
                        opacity: 0.8
                    }).addTo(map);

                    var count250 = (data.circles_250nm || {}).center_count || 0;
                    circle250.bindTooltip('250nm: ' + count250 + ' centers', { permanent: false });
                    allocCircles.push(circle250);

                    // 500nm circle (~926km)
                    var circle500 = L.circle([lat, lon], {
                        radius: 926000,
                        color: '#c97c4a',
                        fill: false,
                        weight: 1,
                        opacity: 0.6,
                        dashArray: '5,5'
                    }).addTo(map);

                    var count500 = (data.circles_500nm || {}).center_count || 0;
                    circle500.bindTooltip('500nm: ' + count500 + ' centers', { permanent: false });
                    allocCircles.push(circle500);

                    // Add markers for centers within circles
                    var centers250 = (data.circles_250nm || {}).centers || [];
                    var centers500 = (data.circles_500nm || {}).centers || [];
                    var allCenters = centers250.concat(centers500);

                    // Remove old center markers
                    centerMarkers.forEach(function (m) { map.removeLayer(m); });
                    centerMarkers = [];

                    var seen = {};
                    allCenters.forEach(function (c) {
                        var key = c.lat + ',' + c.lon;
                        if (seen[key]) return;
                        seen[key] = true;

                        if (c.lat && c.lon) {
                            var marker = L.circleMarker([c.lat, c.lon], {
                                radius: 5,
                                fillColor: '#c97c4a',
                                color: '#7d4b2d',
                                weight: 1,
                                fillOpacity: 0.8
                            }).addTo(map);

                            var name = c.name || c.code || 'Center';
                            marker.bindPopup(name);
                            centerMarkers.push(marker);
                        }
                    });
                })
                .catch(function (err) {
                    setStatus('Allocation circles: ' + err.message, true);
                });
        }

        // ── Distance score ──
        function loadDistanceScore(lat, lon) {
            var organ = organFilter.value;
            var url = apiBase + '/distance-score?lat=' + lat.toFixed(4) +
                '&lon=' + lon.toFixed(4) +
                '&organ=' + encodeURIComponent(organ);

            fetch(url)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    document.getElementById('scoreComposite').textContent =
                        data.composite_score !== undefined ? data.composite_score.toFixed(1) : '--';
                    document.getElementById('scoreProximity').textContent =
                        data.proximity_score !== undefined ? data.proximity_score.toFixed(1) : '--';
                    document.getElementById('scoreCompetition').textContent =
                        data.competition_score !== undefined ? data.competition_score.toFixed(1) : '--';
                    document.getElementById('scoreDonorPool').textContent =
                        data.donor_pool_score !== undefined ? data.donor_pool_score.toFixed(1) : '--';
                    scoreCard.classList.add('visible');
                })
                .catch(function () {
                    scoreCard.classList.remove('visible');
                });
        }

        // ── Allocation checkbox ──
        allocCheck.addEventListener('change', function () {
            if (!allocCheck.checked) {
                clearAllocCircles();
                centerMarkers.forEach(function (m) { map.removeLayer(m); });
                centerMarkers = [];
            }
        });

        // ── Tier config ──
        function fetchTierConfig() {
            fetch(apiBase + '/tier')
                .then(function (r) { return r.ok ? r.json() : null; })
                .then(function (data) {
                    tierConfig = data || defaultWebTier();
                    applyTierCaps();
                })
                .catch(function () {
                    tierConfig = defaultWebTier();
                    applyTierCaps();
                });
        }

        function defaultWebTier() {
            return {
                name: 'web',
                caps: {
                    max_spatial_resolution: 30
                }
            };
        }

        function applyTierCaps() {
            if (!tierConfig) return;
            var caps = tierConfig.caps || {};

            // Badge
            tierBadge.textContent = tierConfig.name === 'local' ? 'Local' : 'Web';
            tierBadge.className = 'tier-badge tier-' + tierConfig.name;

            // Cap resolution
            maxResolution = caps.max_spatial_resolution || 100;
            resSlider.max = maxResolution;
            if (resolution > maxResolution) {
                resolution = maxResolution;
                resSlider.value = resolution;
                resValue.textContent = resolution;
            }

            tierCaps.textContent = 'Max resolution: ' + maxResolution;
        }

        // ── Status ──
        function setStatus(msg, isError) {
            sidebarStatus.textContent = msg;
            if (isError) {
                sidebarStatus.classList.add('error');
            } else {
                sidebarStatus.classList.remove('error');
            }
        }

        // ── Init ──
        function init() {
            initMap();
            loadLayers();
            fetchTierConfig();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>

      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
