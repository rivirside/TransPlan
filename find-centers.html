<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transplant.today - Find My Centers</title>
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js"></script>
    <style>
        .finder-header { text-align: center; padding: 2.5rem 1rem 1rem; }
        .finder-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .finder-header p { color: var(--text-muted, #6b7280); margin-bottom: 1.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }

        .finder-form {
            max-width: 700px; margin: 0 auto 2rem; padding: 0 1rem;
            display: flex; flex-direction: column; gap: 1.25rem;
        }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: var(--text-1, #111); margin-bottom: 0.4rem;
        }
        .form-group .hint { font-size: 0.78rem; color: var(--text-muted, #6b7280); font-weight: 400; margin-left: 0.3rem; }
        .location-row { display: flex; gap: 0.5rem; align-items: center; }
        .location-row input {
            flex: 1; max-width: 200px; padding: 0.55rem 0.75rem;
            border: 1px solid var(--border, #d1d5db); border-radius: 6px;
            font-size: 0.9rem; background: var(--surface, #fff); color: var(--text-1, #111);
        }
        .location-row input:focus { outline: 2px solid var(--accent, #6366f1); border-color: transparent; }
        .location-row button {
            padding: 0.55rem 0.85rem; border: 1px solid var(--border, #d1d5db); border-radius: 6px;
            background: var(--surface, #fff); color: var(--text-1, #111); cursor: pointer; font-size: 0.85rem;
            white-space: nowrap;
        }
        .location-row button:hover { border-color: var(--accent, #6366f1); color: var(--accent, #6366f1); }
        .location-status { font-size: 0.8rem; color: var(--text-muted, #6b7280); }

        .organ-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .organ-pill {
            padding: 0.45rem 0.9rem; border: 1px solid var(--border, #d1d5db); border-radius: 20px;
            background: var(--surface, #fff); color: var(--text-2, #4a4f65); cursor: pointer;
            font-size: 0.85rem; transition: all 0.15s;
        }
        .organ-pill:hover { border-color: var(--accent, #6366f1); color: var(--accent, #6366f1); }
        .organ-pill.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }

        .blood-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .blood-pill {
            padding: 0.35rem 0.7rem; border: 1px solid var(--border, #d1d5db); border-radius: 6px;
            background: var(--surface, #fff); color: var(--text-2, #4a4f65); cursor: pointer;
            font-size: 0.82rem; transition: all 0.15s;
        }
        .blood-pill:hover { border-color: var(--accent, #6366f1); }
        .blood-pill.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }

        .find-btn {
            padding: 0.7rem 2rem; background: var(--accent, #6366f1); color: #fff; border: none;
            border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
            align-self: center; transition: background 0.15s;
        }
        .find-btn:hover { background: #4f46e5; }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Results */
        .results-container { max-width: 900px; margin: 0 auto 3rem; padding: 0 1rem; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .results-header h2 { font-size: 1.15rem; color: var(--text-1); }
        .results-count { font-size: 0.85rem; color: var(--text-muted, #6b7280); }

        .result-card {
            background: var(--surface, #fff); border: 1px solid var(--border, #e5e7eb);
            border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
            display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; align-items: center;
        }
        .result-rank {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
        }
        .result-rank.top3 { background: var(--accent, #6366f1); color: #fff; }
        .result-rank.other { background: var(--surface-raised, #f1f3f7); color: var(--text-2); }
        .result-info h3 { font-size: 0.95rem; font-weight: 600; color: var(--text-1); margin: 0 0 0.2rem; }
        .result-meta { font-size: 0.82rem; color: var(--text-muted, #6b7280); }
        .result-meta span { margin-right: 1rem; }
        .result-scores { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .result-score {
            text-align: center; font-size: 0.72rem; color: var(--text-muted, #6b7280);
            line-height: 1.3;
        }
        .result-score .val { font-size: 0.9rem; font-weight: 700; color: var(--text-1); display: block; }
        .result-link {
            text-align: right;
        }
        .result-link a {
            color: var(--accent, #6366f1); text-decoration: none; font-size: 0.85rem;
            white-space: nowrap;
        }
        .result-link a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .result-card { grid-template-columns: auto 1fr; }
            .result-link { grid-column: 1 / -1; text-align: left; }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <div class="finder-header">
            <h1>Find My Best Centers</h1>
            <p>Enter your location and organ type to get personalized center recommendations ranked by distance, survival rates, wait times, and transplant volume.</p>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">Also try: <a href="wait-estimator.html" style="color: var(--accent);">Wait Time Estimator</a> | <a href="compare.html" style="color: var(--accent);">Compare Centers</a> | <a href="organ-guides.html" style="color: var(--accent);">Organ Guides</a></p>
        </div>

        <div class="finder-form" id="finder-form">
            <div class="form-group">
                <label>Your Location</label>
                <div class="location-row">
                    <input type="text" id="zip-input" placeholder="Zip code" maxlength="5" pattern="[0-9]{5}" inputmode="numeric">
                    <button type="button" id="locate-btn">&#x1F4CD; Use My Location</button>
                    <span class="location-status" id="location-status"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Organ Type</label>
                <div class="organ-pills" id="organ-pills">
                    <button type="button" class="organ-pill" data-organ="kidney">Kidney</button>
                    <button type="button" class="organ-pill" data-organ="liver">Liver</button>
                    <button type="button" class="organ-pill" data-organ="heart">Heart</button>
                    <button type="button" class="organ-pill" data-organ="lung">Lung</button>
                    <button type="button" class="organ-pill" data-organ="pancreas">Pancreas</button>
                    <button type="button" class="organ-pill" data-organ="intestine">Intestine</button>
                </div>
            </div>

            <div class="form-group">
                <label>Blood Type <span class="hint">(optional — affects wait time estimate)</span></label>
                <div class="blood-pills" id="blood-pills">
                    <button type="button" class="blood-pill" data-blood="O">O</button>
                    <button type="button" class="blood-pill" data-blood="A">A</button>
                    <button type="button" class="blood-pill" data-blood="B">B</button>
                    <button type="button" class="blood-pill" data-blood="AB">AB</button>
                </div>
            </div>

            <button type="button" class="find-btn" id="find-btn" disabled>Find Centers</button>
        </div>

        <div class="results-container" id="results" style="display: none;"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components/site-chrome.js?v=8"></script>
    <script src="donation-banner.js"></script>
    <script src="session.js"></script>
    <script>
    (function() {
        'use strict';

        var userLat = null, userLon = null;
        var selectedOrgan = null;
        var selectedBlood = null;
        var allCenters = [], waitFactors = {}, outcomes = {};

        var zipInput = document.getElementById('zip-input');
        var locateBtn = document.getElementById('locate-btn');
        var locationStatus = document.getElementById('location-status');
        var organPills = document.getElementById('organ-pills');
        var bloodPills = document.getElementById('blood-pills');
        var findBtn = document.getElementById('find-btn');
        var resultsEl = document.getElementById('results');

        // --- Data loading ---
        async function loadData() {
            var centersData, wtData, ocData;
            try {
                var r1 = await fetch('data/srtr-all-centers.json');
                centersData = await r1.json();
            } catch (e) { centersData = { centers: {} }; }
            try {
                var r2 = await fetch('data/wait-time-distributions-centers.json');
                wtData = await r2.json();
            } catch (e) { wtData = {}; }
            try {
                var r3 = await fetch('data/post-transplant-outcomes-centers.json');
                ocData = await r3.json();
            } catch (e) { ocData = {}; }

            allCenters = Object.values(centersData.centers || {});
            waitFactors = wtData.center_wait_time_factors || {};
            outcomes = ocData.center_outcomes || {};
        }

        // --- Haversine ---
        function haversine(lat1, lon1, lat2, lon2) {
            var R = 3959, toRad = Math.PI / 180;
            lat1 *= toRad; lon1 *= toRad; lat2 *= toRad; lon2 *= toRad;
            var dlat = lat2 - lat1, dlon = lon2 - lon1;
            var a = Math.sin(dlat/2)*Math.sin(dlat/2) + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlon/2)*Math.sin(dlon/2);
            return R * 2 * Math.asin(Math.sqrt(a));
        }

        // --- Geocode ---
        async function geocodeZip(zip) {
            var url = 'https://nominatim.openstreetmap.org/search?postalcode=' + encodeURIComponent(zip) + '&country=US&format=json&limit=1';
            var r = await fetch(url, { headers: { 'User-Agent': 'TransPlan/1.0' } });
            if (!r.ok) return null;
            var results = await r.json();
            if (!results.length) return null;
            return { lat: parseFloat(results[0].lat), lon: parseFloat(results[0].lon) };
        }

        // --- Scoring ---
        function scoreCenter(center, organ) {
            var code = center.code;
            var dist = (center.lat && center.lon && userLat !== null)
                ? haversine(userLat, userLon, center.lat, center.lon) : 9999;

            // Distance score: 100 at 0 mi, 0 at 500+ mi
            var distScore = Math.max(0, 100 - (dist / 5));

            // Wait time factor score: 1.0 = 70 pts, 0.5 = 85 pts, 2.0 = 40 pts
            var wf = (waitFactors[code] || {})[organ];
            var waitScore = wf !== undefined ? Math.max(0, Math.min(100, 100 - (wf * 30))) : 50;

            // Survival score: just use graft_survival_1yr (already 0-100 range)
            var oc = (outcomes[code] || {})[organ] || {};
            var survScore = oc.graft_survival_1yr !== undefined ? oc.graft_survival_1yr : 50;

            // Volume score: log-scaled, 500+/yr = 100, 1/yr = ~10
            var vol = oc.n_1yr || 0;
            var volScore = vol > 0 ? Math.min(100, Math.log(vol + 1) * 15) : 0;

            // Composite: distance 30%, survival 30%, wait 20%, volume 20%
            var composite = distScore * 0.30 + survScore * 0.30 + waitScore * 0.20 + volScore * 0.20;

            return {
                center: center,
                distance: dist,
                distScore: distScore,
                waitFactor: wf,
                waitScore: waitScore,
                survival: oc.graft_survival_1yr,
                survScore: survScore,
                volume: vol,
                volScore: volScore,
                composite: composite
            };
        }

        function findCenters() {
            if (!userLat || !selectedOrgan) return;

            // Filter centers with the selected organ
            var candidates = allCenters.filter(function(c) {
                return (c.organs || []).indexOf(selectedOrgan) !== -1;
            });

            // Score and sort
            var scored = candidates.map(function(c) { return scoreCenter(c, selectedOrgan); });
            scored.sort(function(a, b) { return b.composite - a.composite; });

            // Render top 20
            renderResults(scored.slice(0, 20), candidates.length);
        }

        function renderResults(results, totalCandidates) {
            resultsEl.style.display = 'block';
            while (resultsEl.firstChild) resultsEl.removeChild(resultsEl.firstChild);

            var header = document.createElement('div');
            header.className = 'results-header';
            var h2 = document.createElement('h2');
            h2.textContent = 'Your Top Centers for ' + selectedOrgan.charAt(0).toUpperCase() + selectedOrgan.slice(1);
            header.appendChild(h2);
            var count = document.createElement('span');
            count.className = 'results-count';
            count.textContent = 'Showing top ' + results.length + ' of ' + totalCandidates + ' ' + selectedOrgan + ' programs';
            header.appendChild(count);
            resultsEl.appendChild(header);

            results.forEach(function(r, i) {
                var card = document.createElement('div');
                card.className = 'result-card';

                // Rank
                var rank = document.createElement('div');
                rank.className = 'result-rank ' + (i < 3 ? 'top3' : 'other');
                rank.textContent = String(i + 1);
                card.appendChild(rank);

                // Info
                var info = document.createElement('div');
                info.className = 'result-info';
                var name = document.createElement('h3');
                name.textContent = r.center.name || 'Unknown';
                info.appendChild(name);

                var meta = document.createElement('div');
                meta.className = 'result-meta';
                var distSpan = document.createElement('span');
                distSpan.textContent = Math.round(r.distance) + ' mi';
                meta.appendChild(distSpan);
                var stateSpan = document.createElement('span');
                stateSpan.textContent = r.center.state || r.center.state_abbr || '';
                meta.appendChild(stateSpan);
                info.appendChild(meta);

                var scores = document.createElement('div');
                scores.className = 'result-scores';

                function addScore(label, value) {
                    var s = document.createElement('div');
                    s.className = 'result-score';
                    var v = document.createElement('span');
                    v.className = 'val';
                    v.textContent = value;
                    s.appendChild(v);
                    s.appendChild(document.createTextNode(label));
                    scores.appendChild(s);
                }

                if (r.survival !== undefined) addScore('1-yr graft', r.survival.toFixed(1) + '%');
                if (r.waitFactor !== undefined) addScore('wait factor', r.waitFactor.toFixed(2) + '\u00d7');
                if (r.volume > 0) addScore('vol/yr', String(r.volume));

                info.appendChild(scores);
                card.appendChild(info);

                // Link
                var linkDiv = document.createElement('div');
                linkDiv.className = 'result-link';
                var a = document.createElement('a');
                a.href = 'center.html?code=' + encodeURIComponent(r.center.code);
                a.textContent = 'Details \u2192';
                linkDiv.appendChild(a);
                card.appendChild(linkDiv);

                resultsEl.appendChild(card);
            });

            resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // --- Event wiring ---
        function updateFindBtn() {
            findBtn.disabled = !(userLat !== null && selectedOrgan);
        }

        zipInput.addEventListener('input', function() {
            var zip = zipInput.value.trim();
            if (zip.length === 5 && /^\d{5}$/.test(zip)) {
                locationStatus.textContent = 'Looking up...';
                geocodeZip(zip).then(function(coords) {
                    if (coords) {
                        userLat = coords.lat; userLon = coords.lon;
                        locationStatus.textContent = 'Location set';
                        updateFindBtn();
                    } else {
                        locationStatus.textContent = 'Zip not found';
                    }
                }).catch(function() { locationStatus.textContent = 'Lookup failed'; });
            }
        });

        locateBtn.addEventListener('click', function() {
            if (!navigator.geolocation) { locationStatus.textContent = 'Not supported'; return; }
            locationStatus.textContent = 'Getting location...';
            navigator.geolocation.getCurrentPosition(function(pos) {
                userLat = pos.coords.latitude; userLon = pos.coords.longitude;
                locationStatus.textContent = 'Location set';
                zipInput.value = '';
                updateFindBtn();
            }, function() { locationStatus.textContent = 'Location denied'; }, { timeout: 10000 });
        });

        organPills.addEventListener('click', function(e) {
            var pill = e.target.closest('.organ-pill');
            if (!pill) return;
            organPills.querySelectorAll('.organ-pill').forEach(function(p) { p.classList.remove('active'); });
            pill.classList.add('active');
            selectedOrgan = pill.getAttribute('data-organ');
            updateFindBtn();
        });

        bloodPills.addEventListener('click', function(e) {
            var pill = e.target.closest('.blood-pill');
            if (!pill) return;
            var wasActive = pill.classList.contains('active');
            bloodPills.querySelectorAll('.blood-pill').forEach(function(p) { p.classList.remove('active'); });
            if (!wasActive) {
                pill.classList.add('active');
                selectedBlood = pill.getAttribute('data-blood');
            } else {
                selectedBlood = null;
            }
        });

        findBtn.addEventListener('click', findCenters);

        // Load data on init
        loadData();
    })();
    </script>
    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
