<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transplant.today - Wait Time Estimator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js"></script>
    <style>
        .est-header { text-align: center; padding: 2.5rem 1rem 1rem; }
        .est-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .est-header p { color: var(--text-muted, #6b7280); margin-bottom: 1.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }

        .est-form {
            max-width: 600px; margin: 0 auto 2rem; padding: 0 1rem;
            display: flex; flex-direction: column; gap: 1.25rem;
        }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: var(--text-1, #111); margin-bottom: 0.4rem;
        }
        .form-group .hint { font-weight: 400; color: var(--text-muted); font-size: 0.78rem; margin-left: 0.3rem; }
        .pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .pill {
            padding: 0.45rem 0.9rem; border: 1px solid var(--border, #d1d5db); border-radius: 20px;
            background: var(--surface, #fff); color: var(--text-2, #4a4f65); cursor: pointer;
            font-size: 0.85rem; transition: all 0.15s;
        }
        .pill:hover { border-color: var(--accent, #6366f1); color: var(--accent, #6366f1); }
        .pill.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }
        .est-btn {
            padding: 0.7rem 2rem; background: var(--accent, #6366f1); color: #fff; border: none;
            border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
            align-self: center; transition: background 0.15s;
        }
        .est-btn:hover { background: #4f46e5; }
        .est-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Result card */
        .est-result {
            max-width: 600px; margin: 0 auto 3rem; padding: 0 1rem; display: none;
        }
        .result-card {
            background: var(--surface, #fff); border: 1px solid var(--border, #e5e7eb);
            border-radius: 8px; padding: 2rem; text-align: center;
        }
        .result-organ { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem; }
        .result-range {
            font-size: 2.5rem; font-weight: 700; color: var(--accent, #6366f1);
            margin: 0.5rem 0;
        }
        .result-label { font-size: 0.9rem; color: var(--text-2); margin-bottom: 1.5rem; }
        .result-breakdown {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
            border-top: 1px solid var(--border-light, #f3f4f6); padding-top: 1.25rem;
            margin-top: 1rem; text-align: left;
        }
        .bd-item { font-size: 0.82rem; }
        .bd-item .bd-label { color: var(--text-muted); }
        .bd-item .bd-val { font-weight: 600; color: var(--text-1); }
        .result-note {
            margin-top: 1.25rem; padding: 0.75rem; background: var(--surface-raised, #f9fafb);
            border-radius: 6px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;
        }
        .result-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }
        .result-actions a {
            padding: 0.45rem 1rem; border: 1px solid var(--border); border-radius: 6px;
            color: var(--accent, #6366f1); text-decoration: none; font-size: 0.85rem;
        }
        .result-actions a:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <div class="est-header">
            <h1>Wait Time Estimator</h1>
            <p>Get a quick estimate of how long you might wait for a transplant based on your organ type and blood type. For a full simulation, use the <a href="simulator.html" style="color: var(--accent);">Simulator</a>.</p>
        </div>

        <div class="est-form">
            <div class="form-group">
                <label>Organ Type</label>
                <div class="pills" id="organ-pills">
                    <button type="button" class="pill" data-organ="kidney">Kidney</button>
                    <button type="button" class="pill" data-organ="liver">Liver</button>
                    <button type="button" class="pill" data-organ="heart">Heart</button>
                    <button type="button" class="pill" data-organ="lung">Lung</button>
                    <button type="button" class="pill" data-organ="pancreas">Pancreas</button>
                    <button type="button" class="pill" data-organ="intestine">Intestine</button>
                </div>
            </div>

            <div class="form-group">
                <label>Blood Type</label>
                <div class="pills" id="blood-pills">
                    <button type="button" class="pill" data-blood="O+">O+</button>
                    <button type="button" class="pill" data-blood="O-">O-</button>
                    <button type="button" class="pill" data-blood="A+">A+</button>
                    <button type="button" class="pill" data-blood="A-">A-</button>
                    <button type="button" class="pill" data-blood="B+">B+</button>
                    <button type="button" class="pill" data-blood="B-">B-</button>
                    <button type="button" class="pill" data-blood="AB+">AB+</button>
                    <button type="button" class="pill" data-blood="AB-">AB-</button>
                </div>
            </div>

            <button type="button" class="est-btn" id="est-btn" disabled>Estimate Wait Time</button>
        </div>

        <div class="est-result" id="result"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components/site-chrome.js"></script>
    <script src="donation-banner.js"></script>
    <script src="session.js"></script>
    <script>
    (function() {
        'use strict';

        var distData = {};
        var selectedOrgan = null;
        var selectedBlood = null;

        // Load distribution data
        fetch('data/wait-time-distributions.json')
            .then(function(r) { return r.json(); })
            .then(function(d) { distData = d; })
            .catch(function() {});

        var organPills = document.getElementById('organ-pills');
        var bloodPills = document.getElementById('blood-pills');
        var estBtn = document.getElementById('est-btn');
        var resultEl = document.getElementById('result');

        function updateBtn() {
            estBtn.disabled = !(selectedOrgan && selectedBlood);
        }

        organPills.addEventListener('click', function(e) {
            var p = e.target.closest('.pill');
            if (!p) return;
            organPills.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('active'); });
            p.classList.add('active');
            selectedOrgan = p.getAttribute('data-organ');
            updateBtn();
        });

        bloodPills.addEventListener('click', function(e) {
            var p = e.target.closest('.pill');
            if (!p) return;
            bloodPills.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('active'); });
            p.classList.add('active');
            selectedBlood = p.getAttribute('data-blood');
            updateBtn();
        });

        estBtn.addEventListener('click', function() {
            if (!selectedOrgan || !selectedBlood) return;

            // Fallback estimates for organs without full distribution data
            var fallbacks = {
                pancreas: { national_median_months: 12, log_sigma: 1.2, blood_type_multipliers: {} },
                intestine: { national_median_months: 6, log_sigma: 1.3, blood_type_multipliers: {} }
            };
            var organData = distData[selectedOrgan] || fallbacks[selectedOrgan];
            if (!organData) { resultEl.style.display = 'none'; return; }

            var nationalMedian = organData.national_median_months;
            var btMultiplier = (organData.blood_type_multipliers || {})[selectedBlood] || 1.0;

            var estimatedMedian = nationalMedian * btMultiplier;

            // Range: use log-sigma to compute 25th and 75th percentile
            var sigma = organData.log_sigma || 1.2;
            var mu = Math.log(estimatedMedian);
            var p25 = Math.exp(mu - 0.674 * sigma); // 25th percentile
            var p75 = Math.exp(mu + 0.674 * sigma); // 75th percentile

            renderResult(selectedOrgan, selectedBlood, estimatedMedian, p25, p75, nationalMedian, btMultiplier);
        });

        function renderResult(organ, blood, median, low, high, natMedian, btMult) {
            resultEl.style.display = 'block';
            while (resultEl.firstChild) resultEl.removeChild(resultEl.firstChild);

            var card = document.createElement('div');
            card.className = 'result-card';

            var organLabel = document.createElement('div');
            organLabel.className = 'result-organ';
            organLabel.textContent = organ.charAt(0).toUpperCase() + organ.slice(1) + ' Transplant \u00b7 Blood Type ' + blood;
            card.appendChild(organLabel);

            var range = document.createElement('div');
            range.className = 'result-range';
            range.textContent = formatMonths(low) + ' \u2013 ' + formatMonths(high);
            card.appendChild(range);

            var label = document.createElement('div');
            label.className = 'result-label';
            label.textContent = 'Estimated wait time range (25th\u201375th percentile)';
            card.appendChild(label);

            var breakdown = document.createElement('div');
            breakdown.className = 'result-breakdown';

            addBd(breakdown, 'National median', formatMonths(natMedian));
            addBd(breakdown, 'Blood type effect', btMult < 1 ? 'Shorter (' + btMult.toFixed(2) + '\u00d7)' : btMult > 1 ? 'Longer (' + btMult.toFixed(2) + '\u00d7)' : 'Average');
            addBd(breakdown, 'Your estimated median', formatMonths(median));
            addBd(breakdown, 'Range (IQR)', formatMonths(low) + ' \u2013 ' + formatMonths(high));

            card.appendChild(breakdown);

            var note = document.createElement('div');
            note.className = 'result-note';
            note.textContent = 'This estimate is based on national SRTR data and does not account for your specific region, medical urgency, sensitization (cPRA), or center-specific factors. For a center-specific estimate with Monte Carlo simulation, use the full Simulator.';
            card.appendChild(note);

            var actions = document.createElement('div');
            actions.className = 'result-actions';
            var simLink = document.createElement('a');
            simLink.href = 'simulator.html';
            simLink.textContent = 'Run Full Simulation';
            actions.appendChild(simLink);
            var findLink = document.createElement('a');
            findLink.href = 'find-centers.html';
            findLink.textContent = 'Find Centers Near Me';
            actions.appendChild(findLink);
            card.appendChild(actions);

            resultEl.appendChild(card);
            resultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function addBd(container, label, value) {
            var item = document.createElement('div');
            item.className = 'bd-item';
            var l = document.createElement('span');
            l.className = 'bd-label';
            l.textContent = label + ': ';
            item.appendChild(l);
            var v = document.createElement('span');
            v.className = 'bd-val';
            v.textContent = value;
            item.appendChild(v);
            container.appendChild(item);
        }

        function formatMonths(m) {
            if (m < 1) return Math.round(m * 30) + ' days';
            if (m < 12) return Math.round(m) + ' mo';
            var years = Math.floor(m / 12);
            var months = Math.round(m % 12);
            if (months === 0) return years + ' yr';
            return years + ' yr ' + months + ' mo';
        }
    })();
    </script>
    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
